<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Study Notes Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell auth-shell">
    <div class="card auth-card">
        <div class="brand">AI Study Notes Generator</div>
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Sign in to continue managing your study notes, reminders, and learning progress.</p>
        </div>

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group password-group">
                <label for="password">Password</label>
                <div class="password-row">
                    <input id="password" type="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" data-password-toggle="password">Show</button>
                </div>
            </div>
            <button class="btn-primary" type="submit">Login</button>
        </form>

        <p class="text-muted auth-footer">New here? <a href="/register">Create an account</a>.</p>
    </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
