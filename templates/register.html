<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Study Notes Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell auth-shell">
    <div class="card auth-card">
        <div class="brand">AI Study Notes Generator</div>
        <div class="auth-header">
            <h1>Create your account</h1>
            <p>Start generating and organizing well-structured study notes with a secure account.</p>
        </div>

        <!-- Error Message -->
        {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Enter username" value="{{ username }}" maxlength="20" required>
                <small class="form-hint">3-20 characters, letters, numbers, underscores only</small>
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" placeholder="name@example.com" value="{{ email }}" required>
            </div>
            <div class="form-group password-group">
                <label for="password">Password</label>
                <div class="password-row">
                    <input id="password" type="password" name="password" placeholder="Create a strong password" required>
                    <button type="button" class="toggle-password" data-password-toggle="password" aria-label="Show password">Show</button>
                </div>
                <small class="form-hint">At least 6 characters</small>
            </div>
            <button class="btn-primary" type="submit">Create account</button>
        </form>

        <p class="text-muted auth-footer">Already have an account? <a href="/login">Sign in</a>.</p>
    </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
